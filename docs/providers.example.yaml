providers:
  # macos_sse is built in by default and does not need to be configured here.
  - provider_id: macos_apns
    delivery: apns
    platform: macos
    app_id: me.fin.bark.macos
    topic: me.fin.bark.macos
    team_id: YOUR_TEAM_ID
    key_id: YOUR_KEY_ID
    private_key: |
      -----BEGIN PRIVATE KEY-----
      YOUR_PRIVATE_KEY
      -----END PRIVATE KEY-----
    environment: production
